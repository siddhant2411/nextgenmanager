spring.application.name=nextgenmanager

spring.datasource.url=${DATASOURCE_URL}
#spring.datasource.url=jdbc:postgresql://localhost:5432/nextgenmanagertest
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#spring.jpa.hibernate.ddl-auto= update


# flyway setup
#spring.flyway.repair=true
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=2
spring.flyway.baseline-description=Initial baseline


spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
logging.level.root=INFO
frontend.url=${FRONTEND_URL}
server.address=0.0.0.0
server.port=8080


spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.main.allow-bean-definition-overriding=true

#minIO setup
minio.url=${MINIO_URL}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.name=${MINIO_BUCKET_NAME}
minio.secure=false

security.jwt.secret=${JWT_SECRET:ReplaceThisWithAtLeast64CharLongJwtSecretKeyForHS512_1234567890}
security.jwt.algorithm=${JWT_ALGORITHM:HS512}
security.jwt.accessExpirationMillis=${JWT_ACCESS_EXPIRATION_MILLIS:900000}
security.jwt.refreshExpirationMillis=${JWT_REFRESH_EXPIRATION_MILLIS:604800000}
security.jwt.issuer=${JWT_ISSUER:https://auth.erp.nextgenmanager.com}
security.jwt.audience=${JWT_AUDIENCE:erp-backend}

mcp.server.enabled=${MCP_SERVER_ENABLED:true}
mcp.server.name=${MCP_SERVER_NAME:nextgenmanager-mcp}
mcp.server.version=${MCP_SERVER_VERSION:0.1.0}
